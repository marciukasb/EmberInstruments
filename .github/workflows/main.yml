on:
  workflow_dispatch:
name: 🚀 Deploy
jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node version
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build 🔨
        run: |
          npm ci
          npm run build

      - name: Deploy via SFTP 📂
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -avz --delete \
            -e "ssh -i /tmp/deploy_key -p 65002 -o StrictHostKeyChecking=no" \
            ./out/ \
            u429394839@45.84.206.66:/home/u429394839/domains/emberinstruments.com/public_html/
          rm /tmp/deploy_key
